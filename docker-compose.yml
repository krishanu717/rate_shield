services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    restart: unless-stopped

  api-gateway:
    build:
      context: ./app
      dockerfile: Dockerfile
    command: ["node", "-r", "tsconfig-paths/register", "dist/apps/api-gateway/src/main.js"]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      - redis
      - redpanda
    restart: unless-stopped

  analytics-service:
    build:
      context: ./app
      dockerfile: Dockerfile
    command: ["node", "-r", "tsconfig-paths/register", "dist/apps/analytics-service/src/main.js"]
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      - redpanda
      - postgres
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./app/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./app/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: